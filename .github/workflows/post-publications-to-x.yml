name: Post New Publications to X

on:
  push:
    branches: [ main ]
    paths:
      - "src/data/publications.js"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare previous publications snapshot
        shell: bash
        run: |
          mkdir -p tmp
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git show HEAD^:src/data/publications.js > tmp/previous-publications.js
          else
            printf 'export const publications = [];\n' > tmp/previous-publications.js
          fi

      - name: Post new publications
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/post-publications-to-x.mjs
